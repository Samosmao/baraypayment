<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baray Payment Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; min-height: 100vh; }
h2 { color: #60a5fa; margin-bottom: 20px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; }
label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; display: block; }
input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 14px; margin-bottom: 14px; }
button { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
button:disabled { background: #334155; cursor: not-allowed; }
.log { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 14px; min-height: 60px; white-space: pre-wrap; word-break: break-all; }
.success { color: #4ade80; } .error { color: #f87171; }
</style>
</head>
<body>
<h2>🧪 Baray Payment Test</h2>
<div class="card">
  <label>API Key</label>
  <input id="apiKey" placeholder="pk_prod_..." />
  <label>Encryption Key / SK</label>
  <input id="sk" placeholder="Base64 SK..." />
  <label>Cypher Key / IV</label>
  <input id="iv" placeholder="Base64 IV..." />
  <label>Amount (USD)</label>
  <input id="amount" value="0.03" type="number" step="0.01" min="0.03" />
  <button id="payBtn" onclick="startPayment()">🚀 Test Payment</button>
  <div class="log" id="log">Ready...</div>
</div>
<script>
function log(msg, type='') {
  const el = document.getElementById('log');
  el.className = 'log ' + type;
  el.textContent = msg;
}
async function startPayment() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const sk = document.getElementById('sk').value.trim();
  const iv = document.getElementById('iv').value.trim();
  const amount = parseFloat(document.getElementById('amount').value).toFixed(2);
  if (!apiKey || !sk || !iv) { log('❌ Fill all fields', 'error'); return; }
  const btn = document.getElementById('payBtn');
  btn.disabled = true; btn.textContent = '⏳ Creating...';
  log('Calling server...');
  try {
    const res = await fetch('/api/pay', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ apiKey, sk, iv, amount, orderId: 'TEST-' + Date.now() })
    });
    const json = await res.json();
    if (json.intentId) {
      const url = 'https://pay.baray.io/' + json.intentId;
      log('✅ Success!\n' + url, 'success');
      setTimeout(() => window.open(url, '_blank'), 800);
    } else {
      log('❌ ' + JSON.stringify(json), 'error');
    }
  } catch(e) { log('❌ ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = '🚀 Test Payment';
}
</script>
</body>
</html>
