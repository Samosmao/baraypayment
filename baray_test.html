<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baray Payment Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; min-height: 100vh; }
h2 { color: #60a5fa; margin-bottom: 20px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; display: block; }
input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 14px; margin-bottom: 14px; }
button { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
button:disabled { background: #334155; cursor: not-allowed; }
.log { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 14px; min-height: 60px; white-space: pre-wrap; word-break: break-all; }
.success { color: #4ade80; }
.error { color: #f87171; }
</style>
</head>
<body>
<h2>🧪 Baray Payment Test</h2>

<div class="card">
  <label>API Key (Public key)</label>
  <input id="apiKey" placeholder="pk_prod_..." />
  <label>Encryption Key / SK</label>
  <input id="sk" placeholder="Base64 SK..." />
  <label>Cypher Key / IV</label>
  <input id="iv" placeholder="Base64 IV..." />
  <label>Amount (USD)</label>
  <input id="amount" value="0.01" type="number" step="0.01" min="0.03" />
  <label>Order ID</label>
  <input id="orderId" value="" placeholder="auto-generated" />
  <button id="payBtn" onclick="startPayment()">🚀 Test Payment</button>
  <div class="log" id="log">Log will appear here...</div>
</div>

<script>
// Auto generate order ID
document.getElementById('orderId').value = 'TEST-' + Date.now();

function log(msg, type = '') {
  const el = document.getElementById('log');
  el.className = 'log ' + type;
  el.textContent = msg;
}

async function encrypt(payload, sk, iv) {
  const keyData = Uint8Array.from(atob(sk), c => c.charCodeAt(0));
  const ivData  = Uint8Array.from(atob(iv), c => c.charCodeAt(0));

  // PKCS7 padding
  const data = new TextEncoder().encode(JSON.stringify(payload));
  const blockSize = 16;
  const padLen = blockSize - (data.length % blockSize);
  const padded = new Uint8Array(data.length + padLen);
  padded.set(data);
  padded.fill(padLen, data.length);

  const key = await crypto.subtle.importKey(
    'raw', keyData, { name: 'AES-CBC' }, false, ['encrypt']
  );
  const encrypted = await crypto.subtle.encrypt(
    { name: 'AES-CBC', iv: ivData }, key, padded
  );
  return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
}

async function startPayment() {
  const apiKey  = document.getElementById('apiKey').value.trim();
  const sk      = document.getElementById('sk').value.trim();
  const iv      = document.getElementById('iv').value.trim();
  const amount  = document.getElementById('amount').value.trim();
  const orderId = document.getElementById('orderId').value.trim() || ('TEST-' + Date.now());

  if (!apiKey || !sk || !iv) { log('❌ Please fill API Key, SK, and IV', 'error'); return; }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Creating intent...';
  log('Encrypting payload...');

  try {
    const payload = {
      amount: parseFloat(amount).toFixed(2),
      currency: 'USD',
      order_id: orderId
    };

    log('Payload: ' + JSON.stringify(payload));

    const encrypted = await encrypt(payload, sk, iv);
    log('Encrypted! Calling API...');

    const res = await fetch('https://api.baray.io/pay', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey
      },
      body: JSON.stringify({ data: encrypted })
    });

    const json = await res.json();
    log('Response: ' + JSON.stringify(json, null, 2));

    if (json._id) {
      const url = 'https://pay.baray.io/' + json._id;
      log('✅ Intent created!\nRedirecting to:\n' + url, 'success');
      setTimeout(() => window.open(url, '_blank'), 1000);
    } else {
      log('❌ Error: ' + JSON.stringify(json), 'error');
    }

  } catch(err) {
    log('❌ Error: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '🚀 Test Payment';
}
</script>
</body>
</html>
